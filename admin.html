<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - A/L Guru</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; min-height: 100vh; padding: 1rem; }
        .login-box, .panel { max-width: 800px; margin: 2rem auto; background: #1e293b; padding: 2rem; border-radius: 12px; border: 1px solid #334155; }
        h1 { text-align: center; color: #60a5fa; margin-bottom: 2rem; }
        input, select, textarea { width: 100%; background: #0f172a; border: 2px solid #334155; color: white; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; font-size: 1rem; }
        button { width: 100%; background: linear-gradient(135deg, #3b82f6, #1e3a8a); color: white; border: none; padding: 1rem; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 0.5rem; }
        button:hover { opacity: 0.9; }
        .hidden { display: none; }
        .tab-btns { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .tab-btn { flex: 1; background: #334155; padding: 0.8rem; border: none; color: #94a3b8; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .output { background: #0f172a; border: 1px solid #334155; padding: 1rem; border-radius: 8px; margin-top: 1rem; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
        .copy-btn { background: #10b981; }
        label { display: block; margin-bottom: 0.3rem; color: #94a3b8; font-size: 0.9rem; }
        .success { background: #065f46; color: #10b981; padding: 1rem; border-radius: 8px; margin-top: 1rem; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .stream-title { color: #60a5fa; font-weight: bold; margin: 1rem 0 0.5rem 0; grid-column: 1 / -1; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="login-box" id="loginBox">
        <h1>🔐 Admin Login</h1>
        <label>Password</label>
        <input type="password" id="password" placeholder="Password එක ගහපන්">
        <button onclick="login()">Login</button>
    </div>

    <div class="panel hidden" id="adminPanel">
        <h1>⚡ A/L Guru Admin</h1>
        
        <div class="tab-btns">
            <button class="tab-btn active" onclick="switchTab('paper', event)">📄 Paper Add</button>
            <button class="tab-btn" onclick="switchTab('note', event)">📝 Short Note Add</button>
        </div>

        <div id="paperForm">
            <label>විෂය</label>
            <select id="paperSubject">
                <option value="">විෂය තෝරන්න</option>
                <optgroup label="Science Stream">
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                    <option value="Combined Mathematics">Combined Mathematics</option>
                    <option value="Agriculture">Agriculture</option>
                </optgroup>
                <optgroup label="Commerce Stream">
                    <option value="Accounting">Accounting</option>
                    <option value="Economics">Economics</option>
                    <option value="Business Studies">Business Studies</option>
                    <option value="Business Statistics">Business Statistics</option>
                </optgroup>
                <optgroup label="Technology Stream">
                    <option value="ICT">ICT</option>
                    <option value="Engineering Technology">Engineering Technology</option>
                    <option value="Bio Systems Technology">Bio Systems Technology</option>
                    <option value="Science for Technology">Science for Technology</option>
                </optgroup>
                <optgroup label="Arts Stream">
                    <option value="Sinhala">Sinhala</option>
                    <option value="Buddhism">Buddhism</option>
                    <option value="Buddhist Civilization">Buddhist Civilization</option>
                    <option value="Hinduism">Hinduism</option>
                    <option value="Hindu Civilization">Hindu Civilization</option>
                    <option value="Christianity">Christianity</option>
                    <option value="Islam">Islam</option>
                    <option value="Islamic Civilization">Islamic Civilization</option>
                    <option value="Greek & Roman Civilization">Greek & Roman Civilization</option>
                    <option value="History">History</option>
                    <option value="Geography">Geography</option>
                    <option value="Political Science">Political Science</option>
                    <option value="Logic">Logic & Scientific Method</option>
                    <option value="Mass Media">Mass Media & Communication</option>
                    <option value="Art">Art</option>
                    <option value="Dancing">Dancing</option>
                    <option value="Music">Music</option>
                    <option value="Drama & Theatre">Drama & Theatre</option>
                    <option value="Home Economics">Home Economics</option>
                </optgroup>
                <optgroup label="Languages">
                    <option value="English">English</option>
                    <option value="Tamil">Tamil</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Arabic">Arabic</option>
                    <option value="Pali">Pali</option>
                    <option value="Sanskrit">Sanskrit</option>
                </optgroup>
            </select>

            <div class="grid">
                <div>
                    <label>භාෂාව</label>
                    <select id="paperMedium">
                        <option value="Sinhala">Sinhala</option>
                        <option value="English">English</option>
                        <option value="Tamil">Tamil</option>
                    </select>
                </div>
                <div>
                    <label>අවුරුද්ද</label>
                    <input type="number" id="paperYear" placeholder="2024" value="2024">
                </div>
            </div>

            <label>Paper Type</label>
            <select id="paperType">
                <option value="Past Paper">Past Paper</option>
                <option value="Model Paper">Model Paper</option>
                <option value="School Paper">School Term Test</option>
                <option value="Provincial Paper">Provincial Paper</option>
            </select>

            <label>PDF Link</label>
            <input type="text" id="paperLink" placeholder="https://drive.google.com/... හෝ papers/physics/2024.pdf">

            <button onclick="generatePaperCode()">⚡ Generate JSON Code</button>
            <div id="paperOutput" class="hidden">
                <div class="output" id="paperCode"></div>
                <button class="copy-btn" onclick="copyCode('paperCode')">📋 Copy Code</button>
                <div class="success">✅ Copy කරලා `papers.json` එකේ Array එක ඇතුලේ Paste කරපන්!</div>
            </div>
        </div>

        <div id="noteForm" class="hidden">
            <label>විෂය</label>
            <select id="noteSubject">
                <option value="">විෂය තෝරන්න</option>
                <optgroup label="Science Stream">
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                    <option value="Combined Mathematics">Combined Mathematics</option>
                </optgroup>
                <optgroup label="Commerce Stream">
                    <option value="Accounting">Accounting</option>
                    <option value="Economics">Economics</option>
                    <option value="Business Studies">Business Studies</option>
                </optgroup>
                <optgroup label="Arts Stream">
                    <option value="History">History</option>
                    <option value="Geography">Geography</option>
                    <option value="Political Science">Political Science</option>
                    <option value="Sinhala">Sinhala</option>
                    <option value="Buddhism">Buddhism</option>
                </optgroup>
                <optgroup label="Technology">
                    <option value="ICT">ICT</option>
                </optgroup>
            </select>

            <label>පාඩම / Topic</label>
            <input type="text" id="noteTopic" placeholder="උදා: Motion, Organic Chemistry, ජනගහනය">

            <label>Note Link / PDF</label>
            <input type="text" id="noteLink" placeholder="https://drive.google.com/...">

            <button onclick="generateNoteCode()">⚡ Generate JSON Code</button>
            <div id="noteOutput" class="hidden">
                <div class="output" id="noteCode"></div>
                <button class="copy-btn" onclick="copyCode('noteCode')">📋 Copy Code</button>
                <div class="success">✅ Copy කරලා `notes.json` එකේ Paste කරපන්!</div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASS = 'alguru2026';

        function login() {
            if (document.getElementById('password').value === ADMIN_PASS) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            } else {
                alert('❌ Password වැරදියි!');
            }
        }

        function switchTab(tab, event) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('paperForm').classList.toggle('hidden', tab !== 'paper');
            document.getElementById('noteForm').classList.toggle('hidden', tab !== 'note');
        }
